name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/web/frontend/**"
      - ".github/workflows/frontend_ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/web/frontend/**"
      - ".github/workflows/frontend_ci.yml"
  workflow_dispatch:

# E2Eテストは Azure の実データベースを更新するため、
# 複数の実行が同時に走ると互いに干渉する。
# 同じワークフローの実行は1つだけに制限し、後から来たものが待つようにする。
# cancel-in-progress: false とすることで、実行中のものを途中で止めない
# （テストの後始末が走らずデータが残るのを防ぐ）。
concurrency:
  group: frontend-ci
  cancel-in-progress: false

defaults:
  run:
    working-directory: backend/web/frontend

jobs:
  build-and-test:
    name: ビルドとテスト
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # npm のキャッシュを有効にして、依存関係の取得を速くする。
          # モノレポのためロックファイルの場所を明示する必要がある。
          cache: npm
          cache-dependency-path: backend/web/frontend/package-lock.json

      - name: 依存関係をインストール
        # npm install ではなく npm ci を使う。
        # ロックファイルのとおりに厳密にインストールし、
        # package.json とロックファイルが食い違っていれば失敗する。
        # CI では再現性が重要なため、こちらが適切。
        run: npm ci

      - name: 静的解析
        run: npm run lint

      - name: 単体テスト
        run: npm run test

      - name: ビルド
        # 本番ビルドが通ることを確認する。TypeScript の型エラーもここで検出される。
        run: npm run build
        env:
          API_BASE_URL: http://${{ secrets.VM_HOST }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Playwrightのブラウザをインストール
        # --with-deps でブラウザの動作に必要なOSのパッケージも入れる。
        # chromium だけを指定して、不要なブラウザのダウンロードを省く。
        run: npx playwright install --with-deps chromium

      - name: E2Eテスト
        # playwright.config.ts の webServer が npm run dev を起動する。
        # reuseExistingServer: !process.env.CI により、CI では必ず新しく起動する。
        run: npm run test:e2e
        env:
          CI: true
          API_BASE_URL: http://${{ secrets.VM_HOST }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          # NextAuth v5 はリバースプロキシ配下などでホストを検証する。
          # CI では localhost で動かすため、ホストの検証を許可する。
          AUTH_TRUST_HOST: true

      - name: テストレポートを保存
        # 失敗したときだけレポートを残す。
        # if: always() ではなく failure() にして、成功時の無駄な保存を避ける。
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: backend/web/frontend/playwright-report/
          retention-days: 7